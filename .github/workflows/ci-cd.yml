name: Backend CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "18"

jobs:
  # ============================================
  # CODE QUALITY
  # ============================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps || npm install
        continue-on-error: false

      - name: Run ESLint
        run: |
          if npm run | grep -q "^  lint$" && ( [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc" ] ); then
            npm run lint
          else
            echo "⚠️  ESLint config or script not found. Skipping code quality check."
          fi
        continue-on-error: true

      - name: Check code formatting
        run: npm run format:check
        continue-on-error: true

  # ============================================
  # UNIT TESTS
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (if available)
        run: |
          if npm run | grep -q "test:unit"; then
            npm run test:unit
          else
            echo "No unit tests found. Skipping."
          fi
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key

  # ============================================
  # INTEGRATION TESTS
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: sleep 5

      - name: Run integration tests (if available)
        run: |
          if npm run | grep -q "test:integration"; then
            npm run test:integration
          else
            echo "No integration tests found. Skipping."
          fi
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/carpooling_test
          JWT_SECRET: test-secret-key

  # ============================================
  # BUILD
  # ============================================
  build:
    name: Build & Security Check
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build application (if build script exists)
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found. Skipping build."
          fi

  # ============================================
  # DEPLOY TO STAGING
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://backend-staging.railway.app

    steps:
      - name: Notify deployment
        run: echo "Railway auto-deploys from develop branch."

  # ============================================
  # DEPLOY TO PRODUCTION
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://backend.railway.app

    steps:
      - name: Notify deployment
        run: echo "Railway auto-deploys from main branch."
